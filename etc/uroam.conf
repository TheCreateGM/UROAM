[general]
enabled = true
log_level = "info"
log_file = "/var/log/uroam/uroamd.log"
socket_path = "/run/uroam/uroamd.sock"
polling_interval_ms = 500

[zram]
enabled = true
size_percent = 50
num_devices = "auto"
default_algorithm = "lz4"

[zswap]
enabled = false
max_pool_percent = 20

[tmpfs]
build_dir = "/tmp/uroam-build"
build_size = "8G"
ai_cache_dir = "/tmp/uroam-ai-cache"
ai_cache_size = "16G"

[profiles.ai]
swappiness = 5
zram_algorithm = "zstd"
zram_size_percent = 50
ksm_enabled = true
ksm_pages_to_scan = 5000
thp_mode = "always"
cache_pressure = 100
background_cgroup_limit = "2G"

[profiles.gaming]
swappiness = 1
zram_algorithm = "lz4"
zram_size_percent = 30
ksm_enabled = false
ksm_pages_to_scan = 0
thp_mode = "always"
cache_pressure = 50
background_cgroup_limit = "4G"

[profiles.balanced]
swappiness = 60
zram_algorithm = "lz4"
zram_size_percent = 25
ksm_enabled = true
ksm_pages_to_scan = 1000
thp_mode = "madvise"
cache_pressure = 100
background_cgroup_limit = "4G"

[profiles.powersaver]
swappiness = 90
zram_algorithm = "zstd"
zram_size_percent = 60
ksm_enabled = true
ksm_pages_to_scan = 3000
thp_mode = "always"
cache_pressure = 25
background_cgroup_limit = "1G"

[idle]
idle_threshold_secs = 300
optimization_level = "normal"
preload_enabled = false