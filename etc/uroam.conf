[global]
enabled = true
log_level = "info"

[monitor]
collection_interval = "1s"
pressure_threshold = 80

[compression]
zram_enabled = true
zram_size = "4G"
zswap_enabled = true

[deduplication]
ksm_enabled = true
ksm_scan_rate = 100

[numa]
aware_allocation = true
auto_migrate = true

[workload]
default_priority = "P2"
